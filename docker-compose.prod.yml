services:
  db:
    image: postgres:18
    container_name: db
    command: >
      postgres -c listen_addresses='*'
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  minio:
    image: minio/minio
    restart: always
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER?Variable not set}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD?Variable not set}
      - MINIO_SERVER_URL=https://cdn.${DOMAIN}
      - MINIO_BROWSER_REDIRECT_URL=https://cdn-admin.${DOMAIN}
    env_file:
      - .env
    networks:
      - traefik-public
      - default
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      # CDN port 9000
      - traefik.http.routers.minio-api-http.rule=Host(`cdn.${DOMAIN?Variable not set}`)
      - traefik.http.routers.minio-api-http.entrypoints=http
      - traefik.http.routers.minio-api-http.middlewares=https-redirect
      - traefik.http.routers.minio-api-http.service=minio-api
      - traefik.http.routers.minio-api-https.rule=Host(`cdn.${DOMAIN?Variable not set}`)
      - traefik.http.routers.minio-api-https.entrypoints=https
      - traefik.http.routers.minio-api-https.tls=true
      - traefik.http.routers.minio-api-https.tls.certresolver=le
      - traefik.http.routers.minio-api-https.service=minio-api
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      # Admin CDN port 9001
      - traefik.http.routers.minio-admin-http.rule=Host(`cdn-admin.${DOMAIN?Variable not set}`)
      - traefik.http.routers.minio-admin-http.entrypoints=http
      - traefik.http.routers.minio-admin-http.middlewares=https-redirect
      - traefik.http.routers.minio-admin-http.service=minio-admin
      - traefik.http.routers.minio-admin-https.rule=Host(`cdn-admin.${DOMAIN?Variable not set}`)
      - traefik.http.routers.minio-admin-https.entrypoints=https
      - traefik.http.routers.minio-admin-https.tls=true
      - traefik.http.routers.minio-admin-https.tls.certresolver=le
      - traefik.http.routers.minio-admin-https.service=minio-admin
      - traefik.http.services.minio-admin.loadbalancer.server.port=9001

  create-buckets:
    image: minio/mc
    restart: no
    container_name: create-buckets
    depends_on:
      - minio
    networks:
      - default
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${MINIO_DEFAULT_BUCKET_NAME:-bucket};
      /usr/bin/mc anonymous set public myminio/${MINIO_DEFAULT_BUCKET_NAME:-bucket};
      exit 0;
      "

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD?Variable not set}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - default
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD?Variable not set}
    env_file:
      - .env

  backend:
    build:
      context: ./backend_service
      dockerfile: Dockerfile
      target: production
    container_name: backend
    ports:
      - "8000:8000"
    restart: always
    networks:
      - default
      - traefik-public
    depends_on:
      - db
      - minio
    env_file:
      - .env
    environment:
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER?Variable not set}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD?Variable not set}
      - AWS_STORAGE_BUCKET_NAME=${MINIO_DEFAULT_BUCKET_NAME?Variable not set}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_PASSWORD=${REDIS_PASSWORD?Variable not set}
      - REDIS_PORT=6379
      - REDIS_HOST=redis
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      # REST API Routes
      - traefik.http.routers.api-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.api-http.entrypoints=http
      - traefik.http.routers.api-http.middlewares=https-redirect
      - traefik.http.routers.api-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.api-https.entrypoints=https
      - traefik.http.routers.api-https.tls=true
      - traefik.http.routers.api-https.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8000
      # Websocket Routes
      - traefik.http.routers.ws-https.rule=Host(`${DOMAIN}`) && PathPrefix(`/ws/`)
      - traefik.http.routers.ws-https.entrypoints=https
      - traefik.http.routers.ws-https.tls=true
      - traefik.http.routers.ws-https.tls.certresolver=le
      - traefik.http.routers.ws-https.service=api
      - traefik.http.routers.ws-https.priority=100
      - traefik.http.services.api.loadbalancer.server.port=8000
      - traefik.http.services.api.loadbalancer.server.scheme=http

  frontend:
    build:
      context: ./frontend_service
      dockerfile: Dockerfile
      target: production
    container_name: frontend
    image: frontend
    ports:
      - "4000:4000"
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - API_ORIGIN=https://api.${DOMAIN?Variable not set}/api
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.frontend-http.rule=Host(`${DOMAIN?Variable not set}`)
      - traefik.http.routers.frontend-http.entrypoints=http
      - traefik.http.routers.frontend-http.middlewares=https-redirect
      - traefik.http.routers.frontend-https.rule=Host(`${DOMAIN?Variable not set}`)
      - traefik.http.routers.frontend-https.entrypoints=https
      - traefik.http.routers.frontend-https.tls=true
      - traefik.http.routers.frontend-https.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=4000


networks:
  traefik-public:
    external: true

volumes:
  minio-volume:
  app-db-data:
  redis_data:
