services:
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    env_file:
      - .env
    networks:
      - minio-network
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  create-buckets:
    image: minio/mc
    container_name: create-buckets
    depends_on:
      - minio
    networks:
      - minio-network
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${MINIO_DEFAULT_BUCKET_NAME:-bucket};
      /usr/bin/mc anonymous set public myminio/${MINIO_DEFAULT_BUCKET_NAME:-bucket};
      exit 0;
      "


networks:
  minio-network:
    driver: bridge

volumes:
  minio-volume:
    driver: local
